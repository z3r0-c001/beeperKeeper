apiVersion: 1

groups:
  - orgId: 1
    name: BME680 Environmental Alerts
    folder: Beeper Keeper
    interval: 1m
    rules:
      # Test Alert - Email Template
      - uid: test_email_template
        title: Test Email Template - Optimized Images
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["_measurement"] == "mqtt_consumer")
                  |> filter(fn: (r) => r["_field"] == "temperature")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 0  # Alert if temp > 0°C (will always fire)
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 1m
        annotations:
          summary: '🧪 BEEPER KEEPER: Test Email Alert'
          description: 'Temperature is {{ $values.A.Value }}°C. This is a test alert to verify the optimized chicken logo (120x120px, 10.7KB) and farm logo (80x80px, 14.4KB) display correctly in emails.'
        labels:
          severity: info
          sensor: BME680

      # High Temperature Alert
      - uid: temp_high
        title: High Temperature Alert
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["_measurement"] == "mqtt_consumer")
                  |> filter(fn: (r) => r["_field"] == "temperature")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 35  # Alert if temp > 35°C (95°F)
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: '🌡️ BEEPER KEEPER ALERT: High Temperature {{ printf "%.1f" $values.A.Value }}°C'
          description: 'Temperature is {{ $values.A.Value }}°C (threshold: 35°C)'
        labels:
          severity: warning
          sensor: BME680

      # Low Temperature Alert
      - uid: temp_low
        title: Low Temperature Alert  
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["_measurement"] == "mqtt_consumer")
                  |> filter(fn: (r) => r["_field"] == "temperature")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 10  # Alert if temp < 10°C (50°F)
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: '❄️ BEEPER KEEPER ALERT: Low Temperature {{ printf "%.1f" $values.A.Value }}°C'
          description: 'Temperature is {{ $values.A.Value }}°C (threshold: 10°C)'
        labels:
          severity: warning
          sensor: BME680

      # High Humidity Alert
      - uid: humidity_high
        title: High Humidity Alert
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["_measurement"] == "mqtt_consumer")
                  |> filter(fn: (r) => r["_field"] == "humidity")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 80  # Alert if humidity > 80%
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: '💧 BEEPER KEEPER ALERT: High Humidity {{ printf "%.0f" $values.A.Value }}%'
          description: 'Humidity is {{ $values.A.Value }}% (threshold: 80%)'
        labels:
          severity: warning
          sensor: BME680

      # Low Humidity Alert
      - uid: humidity_low
        title: Low Humidity Alert
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["_measurement"] == "mqtt_consumer")
                  |> filter(fn: (r) => r["_field"] == "humidity")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 20  # Alert if humidity < 20%
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: '🏜️ BEEPER KEEPER INFO: Low Humidity {{ printf "%.0f" $values.A.Value }}%'
          description: 'Humidity is {{ $values.A.Value }}% (threshold: 20%)'
        labels:
          severity: info
          sensor: BME680

      # CPU Temperature Critical
      - uid: cpu_temp_critical
        title: CPU Temperature Critical
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["_measurement"] == "mqtt_consumer")
                  |> filter(fn: (r) => r["_field"] == "cpu_temp")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 80  # Alert if CPU temp > 80°C
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 1m
        annotations:
          summary: '🔥 BEEPER KEEPER CRITICAL: CPU Overheating {{ printf "%.0f" $values.A.Value }}°C'
          description: 'CPU temperature is {{ $values.A.Value }}°C (threshold: 80°C)'
        labels:
          severity: critical
          sensor: System

      # Light Turned ON Alert
      - uid: light_turned_on
        title: Light Turned ON
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["topic"] == "beeper/sensors/camera/lux")
                  |> aggregateWindow(every: 30s, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 100  # Alert if lux > 100 (light detected)
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 30s
        annotations:
          summary: '💡 BEEPER KEEPER: Coop Light Turned ON ({{ printf "%.0f" $values.A.Value }} lux)'
          description: 'Light level is {{ $values.A.Value }} lux (threshold: 100 lux). A light source has been detected in the chicken coop.'
        labels:
          severity: info
          sensor: Camera

      # Light Turned OFF Alert
      - uid: light_turned_off
        title: Light Turned OFF
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["topic"] == "beeper/sensors/camera/lux")
                  |> aggregateWindow(every: 30s, fn: mean, createEmpty: false)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 50  # Alert if lux < 50 (light turned off/dark)
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: OK
        for: 30s
        annotations:
          summary: '🌙 BEEPER KEEPER: Coop Light Turned OFF ({{ printf "%.0f" $values.A.Value }} lux)'
          description: 'Light level is {{ $values.A.Value }} lux (threshold: 50 lux). The light in the chicken coop has been turned off or it is now dark.'
        labels:
          severity: info
          sensor: Camera

      # No Sensor Data
      - uid: no_sensor_data
        title: No Sensor Data Received
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: InfluxDB_Beeper
            model:
              query: |
                from(bucket: "sensors")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r["_measurement"] == "mqtt_consumer")
                  |> filter(fn: (r) => r["_field"] == "temperature")
                  |> count()
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              conditions:
                - evaluator:
                    params:
                      - 1  # Alert if data count < 1 (no data)
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: Alerting
        execErrState: Error
        for: 10m
        annotations:
          summary: '⚠️ BEEPER KEEPER CRITICAL: Sensor Offline - No Data'
          description: 'No data from BME680 sensor in the last 10 minutes. Check MQTT publisher and sensor connection.'
        labels:
          severity: critical
          sensor: BME680
